<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luis Albornoz | Gestor Cultural, Ilusionista y Creador Escénico</title>
    <meta name="description" content="Luis Albornoz, gestor cultural e ilusionista radicado en el Desierto de Atacama, Chile. Desarrollo de proyectos escénicos que integran arte, territorio e innovación social." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000;
            --fg: #f4f4f4;
            --muted: rgba(255, 255, 255, .65);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            background: var(--bg); color: var(--fg);
            font-family: "Inter Tight", sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .lang-switch {
            position: fixed; top: 40px; right: 60px;
            z-index: 100;
        }

        .lang-switch a {
            color: var(--fg); text-decoration: none;
            font-size: 11px; letter-spacing: 2px;
            opacity: .4; transition: opacity .3s;
        }

        .lang-switch a:hover { opacity: 1; }

        .container {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            position: relative; z-index: 10;
        }

        nav ul {
            list-style: none; padding: 0; margin: 0;
            display: flex; gap: 40px;
        }

        nav a {
            color: var(--fg); text-decoration: none;
            font-size: 11px; letter-spacing: 3px;
            text-transform: uppercase;
            opacity: .6; transition: all .4s ease;
        }

        nav a:hover { opacity: 1; letter-spacing: 4px; }

        .hero h1 {
            font-size: clamp(32px, 6vw, 72px);
            font-weight: 300; line-height: 1.1;
            margin: 0; letter-spacing: -2px;
            max-width: 800px;
        }

        .hero p {
            font-size: 14px; letter-spacing: 4px;
            text-transform: uppercase; margin-top: 20px;
            color: var(--muted);
        }

        .footer {
            display: grid; grid-template-columns: repeat(4, 1fr);
            align-items: end;
        }

        .footer-col h4 {
            font-size: 10px; letter-spacing: 3px;
            text-transform: uppercase; color: var(--muted);
            margin-bottom: 15px; font-weight: 400;
        }

        .footer-col p, .footer-col a {
            font-size: 12px; color: var(--fg);
            text-decoration: none; margin: 0;
            line-height: 1.8; display: block;
        }

        .video-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            overflow: hidden;
        }

        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover; opacity: .4;
            filter: grayscale(100%) contrast(110%);
        }

        @media (max-width: 768px) {
            .container { padding: 40px 30px; }
            .footer { grid-template-columns: 1fr 1fr; gap: 40px; }
            .lang-switch { top: 30px; right: 30px; }
            nav ul { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <a href="en/index.html">EN</a>
    </div>

    <div class="container">
        <nav>
            <ul>
                <li><a href="#proyectos">Proyectos</a></li>
                <li><a href="#bio">Trayectoria</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>

        <div class="hero">
            <h1>Luis Albornoz</h1>
            <p>Ilusionista · Creador · Gestor Cultural</p>
        </div>

        <div class="footer">
            <div class="footer-col">
                <h4>Ubicación</h4>
                <p>Copiapó, Atacama</p>
                <p>Chile</p>
            </div>
            <div class="footer-col">
                <h4>Contacto</h4>
                <a href="mailto:luisalbornoz@gmail.com">luisalbornoz@gmail.com</a>
                <a href="tel:+56992238085">+56 9 9223 8085</a>
            </div>
            <div class="footer-col">
                <h4>Recursos</h4>
                <a href="https://drive.google.com/drive/folders/1Z386t4rUbsZg7R92Y4rG-MYBZl6e0bnV?usp=sharing" target="_blank" rel="noopener noreferrer">Kit de Prensa</a>
                <a href="https://www.atacamagica.cl" target="_blank">Atacamagica</a>
            </div>
            <div class="footer-col" style="text-align: right;">
                <p>© 2026</p>
            </div>
        </div>
    </div>

    <div class="video-bg">
        <video autoplay muted loop playsinline poster="bg-poster.jpg">
            <source src="luis-albornoz-ilusionista-creador-atacama.webm" type="video/webm" />
            <source src="luis-albornoz-ilusionista-creador-atacama.mp4" type="video/mp4" />
        </video>
    </div>

    <script>
        function accessProfessional(tipo) {
            const masterKey = "ALBORNOZ2026";
            const input = prompt("Acceso Restringido. Por favor, ingresa la clave de acceso profesional:");

            if (input === masterKey) {
                if (tipo === 'obra') {
                    window.open("luis-albornoz-un-mago-en-el-desierto-dossier.pdf", '_blank');
                } 
                else if (tipo === 'transferencia') {
                    const perfil = prompt("Selecciona tu perfil para el dossier adecuado:\n1. Empresa / Innovación\n2. Institución Cultural / Social\n(Escribe 1 o 2)");
                    if (perfil === "1") {
                        window.open("luis-albornoz-belleza-empresa.pdf", '_blank');
                    } else if (perfil === "2") {
                        window.open("luis-albornoz-belleza-cultural.pdf", '_blank');
                    } else {
                        alert("Opción no válida.");
                    }
                }
                else if (tipo === 'press') {
                    // Acceso directo al nuevo Kit de Prensa
                    window.open("https://drive.google.com/drive/folders/1Z386t4rUbsZg7R92Y4rG-MYBZl6e0bnV?usp=sharing", '_blank');
                }
            } else if (input !== null) {
                alert("Clave incorrecta. Si eres prensa o programador, contacta a luisalbornoz@gmail.com");
            }
        }
    </script>
</body>
</html>
